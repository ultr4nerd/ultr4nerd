<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#0d1117" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#161b22">
        <animate attributeName="stop-color" values="#161b22;#0d1117;#161b22" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#58a6ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#bc8cff">
        <animate attributeName="stop-color" values="#bc8cff;#58a6ff;#bc8cff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#58a6ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="name-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9d1d9"/>
      <stop offset="100%" style="stop-color:#f0f6fc"/>
    </linearGradient>

    <clipPath id="line-reveal">
      <rect x="0" y="0" width="0" height="4">
        <animate attributeName="width" from="0" to="900" dur="1.5s" fill="freeze" begin="0.3s"/>
      </rect>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .name {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 52px;
        font-weight: 700;
        fill: #f0f6fc;
        opacity: 0;
        animation: fadeUp 0.8s ease-out 0.5s forwards;
      }

      .title {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 18px;
        font-weight: 400;
        fill: #58a6ff;
        opacity: 0;
        animation: fadeUp 0.8s ease-out 0.9s forwards;
      }

      .tagline {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 14px;
        font-weight: 400;
        fill: #8b949e;
        opacity: 0;
        animation: fadeUp 0.8s ease-out 1.3s forwards;
      }

      .dot {
        opacity: 0;
        animation: dotPulse 3s ease-in-out infinite;
      }

      .dot-1 { animation-delay: 1.6s; }
      .dot-2 { animation-delay: 1.8s; }
      .dot-3 { animation-delay: 2.0s; }

      .cursor {
        opacity: 0;
        animation: blink 1s step-end infinite 1.5s;
      }

      .border-line {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.2s forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg-gradient)" rx="8"/>

  <!-- Animated accent line top -->
  <rect class="border-line" y="0" width="900" height="3" fill="url(#accent-line)" rx="8"/>

  <!-- Decorative grid dots -->
  <g fill="#58a6ff" opacity="0.06">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="80" cy="50" r="1.5"/>
    <circle cx="110" cy="50" r="1.5"/>
    <circle cx="50" cy="80" r="1.5"/>
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="110" cy="80" r="1.5"/>
    <circle cx="50" cy="110" r="1.5"/>
    <circle cx="80" cy="110" r="1.5"/>
    <circle cx="110" cy="110" r="1.5"/>
    <circle cx="790" cy="200" r="1.5"/>
    <circle cx="820" cy="200" r="1.5"/>
    <circle cx="850" cy="200" r="1.5"/>
    <circle cx="790" cy="230" r="1.5"/>
    <circle cx="820" cy="230" r="1.5"/>
    <circle cx="850" cy="230" r="1.5"/>
    <circle cx="790" cy="260" r="1.5"/>
    <circle cx="820" cy="260" r="1.5"/>
    <circle cx="850" cy="260" r="1.5"/>
  </g>

  <!-- Accent bracket left -->
  <text x="60" y="148" font-family="'JetBrains Mono', monospace" font-size="60" fill="#58a6ff" opacity="0.15">
    {
  </text>

  <!-- Accent bracket right -->
  <text x="810" y="148" font-family="'JetBrains Mono', monospace" font-size="60" fill="#58a6ff" opacity="0.15">
    }
  </text>

  <!-- Name -->
  <text class="name" x="450" y="120" text-anchor="middle">Mauricio Chavez</text>

  <!-- Blinking cursor after name -->
  <rect class="cursor" x="690" y="92" width="3" height="35" fill="#58a6ff"/>

  <!-- Title -->
  <text class="title" x="450" y="165" text-anchor="middle">Forward Deployed Software Engineer @ TurboAI</text>

  <!-- Tagline -->
  <text class="tagline" x="450" y="205" text-anchor="middle">AI-augmented workflows  ·  agents  ·  backend  ·  open source</text>

  <!-- Animated dots -->
  <circle class="dot dot-1" cx="410" cy="245" r="3" fill="#58a6ff"/>
  <circle class="dot dot-2" cx="440" cy="245" r="3" fill="#bc8cff"/>
  <circle class="dot dot-3" cx="470" cy="245" r="3" fill="#58a6ff"/>

  <!-- Animated accent line bottom -->
  <rect class="border-line" y="297" width="900" height="3" fill="url(#accent-line)" rx="8"/>
</svg>
